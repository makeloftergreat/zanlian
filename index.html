<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赞链 · LOFTER 点赞互助平台</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg-card:#13131a;--bg-hover:#1a1a25;--border:#25253a;--border-light:#303045;
  --text:#e8e8f0;--text-secondary:#8888aa;--text-dim:#555570;
  --accent:#ff5c5c;--accent-hover:#ff7575;--accent-glow:rgba(255,92,92,.3);
  --success:#4ade80;--success-glow:rgba(74,222,128,.3);
  --gold:#fbbf24;--gold-glow:rgba(251,191,36,.3);
  --radius:16px;--transition:all .3s cubic-bezier(.4,0,.2,1);
}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
[v-cloak]{display:none}

/* Nav */
.navbar{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.navbar .logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:800}
.navbar .logo .heart{color:var(--accent);font-size:24px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.navbar .nav-right{display:flex;align-items:center;gap:16px}
.navbar .user-info{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text-secondary)}
.navbar .user-info .badge{background:var(--accent);color:#fff;padding:2px 8px;border-radius:6px;font-size:12px;font-weight:600}
.navbar .btn-logout{background:none;border:1px solid var(--border-light);color:var(--text-secondary);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;transition:var(--transition)}
.navbar .btn-logout:hover{border-color:var(--accent);color:var(--accent)}

/* Container */
.container{max-width:640px;margin:0 auto;padding:20px 16px 60px}

/* Hero (landing) */
.hero{text-align:center;padding:48px 20px 32px}
.hero .icon{font-size:56px;margin-bottom:16px;animation:pulse 2s ease-in-out infinite}
.hero h1{font-size:28px;font-weight:800;margin-bottom:12px;background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero .subtitle{color:var(--text-secondary);font-size:16px;margin-bottom:8px}
.hero .desc{color:var(--text-dim);font-size:14px;margin-bottom:28px;line-height:1.8}
.hero .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:12px 28px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:var(--transition);box-shadow:0 4px 20px var(--accent-glow)}
.btn-primary:hover{background:var(--accent-hover);transform:translateY(-2px);box-shadow:0 6px 28px var(--accent-glow)}
.btn-secondary{background:var(--bg-card);color:var(--text);border:1px solid var(--border-light);padding:12px 28px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:var(--transition)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);background:var(--bg-hover)}

/* Features grid */
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:28px 0}
.feature-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;transition:var(--transition)}
.feature-card:hover{border-color:var(--border-light);background:var(--bg-hover);transform:translateY(-2px)}
.feature-card .icon{font-size:32px;margin-bottom:10px}
.feature-card h3{font-size:14px;font-weight:700;margin-bottom:6px}
.feature-card p{font-size:12px;color:var(--text-secondary);line-height:1.5}

/* Auth forms */
.auth-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px;margin:24px 0;max-width:420px;margin-left:auto;margin-right:auto}
.auth-box h2{font-size:22px;font-weight:800;margin-bottom:6px;text-align:center}
.auth-box .auth-sub{font-size:14px;color:var(--text-secondary);text-align:center;margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:6px;font-weight:600}
.form-group input{width:100%;background:var(--bg);border:1px solid var(--border-light);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;transition:var(--transition)}
.form-group input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.form-group .hint{font-size:12px;color:var(--text-dim);margin-top:4px}
.btn-full{width:100%;background:var(--accent);color:#fff;border:none;padding:13px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:var(--transition);box-shadow:0 4px 16px var(--accent-glow)}
.btn-full:hover{background:var(--accent-hover)}
.auth-toggle{text-align:center;margin-top:16px;font-size:14px;color:var(--text-secondary)}
.auth-toggle a{cursor:pointer;font-weight:600}

.setup-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px;margin:24px 0}
.setup-box h2{font-size:22px;font-weight:800;margin-bottom:6px;text-align:center}
.setup-box .setup-sub{font-size:14px;color:var(--text-secondary);text-align:center;margin-bottom:24px}

.btn-settings{background:transparent;border:1px solid var(--border);color:var(--text-primary);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;white-space:nowrap;transition:all .2s}
.btn-settings:hover{border-color:var(--accent);color:var(--accent)}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;white-space:nowrap;transition:all .2s}
.btn-logout:hover{border-color:#ef4444;color:#ef4444}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto}
.modal-box h2{font-size:20px;font-weight:800;margin-bottom:20px;text-align:center}
.modal-actions{display:flex;gap:12px;margin-top:20px}
.modal-actions button{flex:1;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.btn-cancel{background:transparent;border:1px solid var(--border) !important;color:var(--text-secondary)}
.btn-save{background:var(--accent);color:#fff}
.test-badge{background:#f59e0b;color:#fff;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;margin-left:8px}
.btn-skip{width:100%;margin-top:12px;background:transparent;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;padding:8px;transition:color .2s}
.btn-skip:hover{color:var(--text-primary)}
.auth-error{background:rgba(255,92,92,.1);border:1px solid var(--accent);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--accent);margin-bottom:16px}

/* Dashboard */
.welcome-bar{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.welcome-bar .left{display:flex;align-items:center;gap:12px}
.welcome-bar .avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.welcome-bar .info h3{font-size:16px;font-weight:700}
.welcome-bar .info p{font-size:13px;color:var(--text-secondary)}
.welcome-bar .stats{display:flex;gap:16px}
.welcome-bar .stat{text-align:center}
.welcome-bar .stat .num{font-size:22px;font-weight:800}
.welcome-bar .stat .num.given{color:var(--accent)}
.welcome-bar .stat .num.received{color:var(--success)}
.welcome-bar .stat .label{font-size:11px;color:var(--text-dim);margin-top:2px}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:16px}
.tab{flex:1;padding:10px;border-radius:8px;text-align:center;font-size:14px;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:var(--transition);border:none;background:none}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 12px var(--accent-glow)}
.tab:not(.active):hover{background:var(--bg-hover);color:var(--text)}

/* Task card */
.task-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;transition:var(--transition)}
.task-card:hover{border-color:var(--border-light)}
.task-card .task-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.task-card .task-badge{background:var(--accent-glow);color:var(--accent);padding:4px 12px;border-radius:8px;font-size:12px;font-weight:600}
.task-card .task-status{font-size:12px;color:var(--text-dim)}
.task-card .task-url-box{background:var(--bg);border:1px solid var(--border-light);border-radius:10px;padding:14px;margin-bottom:14px}
.task-card .task-url-box .label{font-size:12px;color:var(--text-dim);margin-bottom:6px}
.task-card .task-url-box .url{font-size:13px;color:var(--accent);word-break:break-all;line-height:1.5}
.task-card .task-actions{display:flex;gap:10px}
.task-card .btn-go{flex:1;background:var(--accent);color:#fff;border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:var(--transition);text-align:center;display:block}
.task-card .btn-go:hover{background:var(--accent-hover)}
.task-card .btn-confirm{flex:1;background:var(--success);color:#0a0a0f;border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:var(--transition)}
.task-card .btn-confirm:hover{filter:brightness(1.1)}
.task-card .task-info{font-size:13px;color:var(--text-secondary);margin-bottom:14px;line-height:1.6}
.task-card .task-info span{color:var(--text);font-weight:600}

/* Empty state */
.empty-state{text-align:center;padding:48px 20px;color:var(--text-dim)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state h3{font-size:16px;font-weight:600;margin-bottom:8px;color:var(--text-secondary)}
.empty-state p{font-size:14px;line-height:1.6}

/* Queue */
.queue-list{display:flex;flex-direction:column;gap:10px}
.queue-item{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;transition:var(--transition)}
.queue-item:hover{border-color:var(--border-light);background:var(--bg-hover)}
.queue-item .pos{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;margin-right:12px}
.queue-item .pos.next{background:var(--accent-glow);color:var(--accent)}
.queue-item .pos.waiting{background:var(--bg-hover);color:var(--text-dim)}
.queue-item .pos.done{background:var(--success-glow);color:var(--success)}
.queue-item .info{flex:1}
.queue-item .info .name{font-size:14px;font-weight:600}
.queue-item .info .status{font-size:12px;color:var(--text-dim);margin-top:2px}
.queue-item .info .status.active{color:var(--success)}
.queue-item .info .status.waiting{color:var(--gold)}

/* Log */
.log-list{display:flex;flex-direction:column;gap:8px}
.log-item{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;font-size:13px}
.log-item .arrow{color:var(--text-dim)}
.log-item .from{color:var(--accent);font-weight:600}
.log-item .to{color:var(--text-secondary)}
.log-item .time{margin-left:auto;color:var(--text-dim);font-size:12px;white-space:nowrap}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--border-light);border-radius:12px;padding:14px 24px;font-size:14px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.4);transition:var(--transition)}
.toast.success{border-color:var(--success);color:var(--success)}
.toast.error{border-color:var(--accent);color:var(--accent)}
.toast.info{border-color:var(--gold);color:var(--gold)}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text-dim)}
.loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* FAQ */
.faq-item{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.faq-item .q{padding:16px 18px;font-size:14px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:var(--transition)}
.faq-item .q:hover{background:var(--bg-hover)}
.faq-item .q .arrow{transition:transform .3s}
.faq-item .q .arrow.open{transform:rotate(180deg)}
.faq-item .a{max-height:0;overflow:hidden;transition:max-height .3s ease;font-size:13px;color:var(--text-secondary);line-height:1.7}
.faq-item .a.open{max-height:300px;padding:0 18px 16px}

/* Footer */
.footer{text-align:center;padding:32px 16px;color:var(--text-dim);font-size:13px}
.footer a{color:var(--text-secondary)}
.footer .divider{margin:0 8px;color:var(--border-light)}

@media(max-width:480px){
  .hero h1{font-size:22px}
  .hero .desc{font-size:13px}
  .welcome-bar{flex-direction:column;gap:14px}
  .welcome-bar .stats{width:100%;justify-content:center}
  .features{grid-template-columns:1fr 1fr}
  .task-card .task-actions{flex-direction:column}
}
</style>
</head>
<body>
<div id="app" v-cloak>

<!-- Navbar -->
<div class="navbar">
  <div class="logo">
    <span class="heart">&#10084;</span>
    <span>赞链</span>
  </div>
  <div class="nav-right" v-if="user">
    <div class="user-info">
      <span>{{ profile.username }}</span>
      <span class="badge">{{ profile.today_given }}/20</span>
    </div>
    <button class="btn-logout" @click="logout">退出</button>
  </div>
</div>

<!-- Not logged in -->
<template v-if="!user">
  <!-- Hero -->
  <div class="container">
    <div class="hero">
      <div class="icon">&#10084;</div>
      <h1>赞链 · LOFTER 点赞互助</h1>
      <p class="subtitle">先付后得 · 公平排队 · 双账号隔离</p>
      <p class="desc">用马甲号帮别人点赞，你的创作号排队获得回赞。<br>马甲号和创作号完全隔离，保护你的隐私。</p>
      <div class="actions">
        <button class="btn-primary" @click="showAuth='register'">开始使用</button>
        <button class="btn-secondary" @click="showAuth='login'">登录</button>
      </div>
    </div>

    <!-- Features -->
    <div class="features">
      <div class="feature-card">
        <div class="icon">&#128104;</div>
        <h3>双账号隔离</h3>
        <p>马甲号点赞，创作号收赞，互不暴露</p>
      </div>
      <div class="feature-card">
        <div class="icon">&#128279;</div>
        <h3>公平排队</h3>
        <p>先来后到，位置透明可查</p>
      </div>
      <div class="feature-card">
        <div class="icon">&#128202;</div>
        <h3>溯源日志</h3>
        <p>每次点赞都有记录，只显示马甲号</p>
      </div>
      <div class="feature-card">
        <div class="icon">&#128737;</div>
        <h3>每日上限</h3>
        <p>每天最多 20 次，防止滥用</p>
      </div>
    </div>

    <!-- Auth -->
    <div class="auth-box" v-if="showAuth">
      <h2>{{ showAuth === 'register' ? '注册赞链' : '登录赞链' }}</h2>
      <p class="auth-sub">{{ showAuth === 'register' ? '创建账号，开始互助点赞' : '欢迎回来' }}</p>
      <div class="auth-error" v-if="authError">{{ authError }}</div>
      <template v-if="showAuth === 'register'">
        <div class="form-group">
          <label>邮箱</label>
          <input v-model="regForm.email" type="email" placeholder="用于注册和登录">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input v-model="regForm.password" type="password" placeholder="至少 6 位">
        </div>
        <div class="hint" style="text-align:center;margin-bottom:16px;color:var(--text-dim);font-size:13px">
          注册后进入网站，再填写你的点赞号和收赞号
        </div>
        <button class="btn-full" @click="register" :disabled="loading">
          {{ loading ? '注册中...' : '注册' }}
        </button>
      </template>
      <template v-else>
        <div class="form-group">
          <label>邮箱</label>
          <input v-model="loginForm.email" type="email" placeholder="注册时的邮箱">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input v-model="loginForm.password" type="password" placeholder="登录密码">
        </div>
        <button class="btn-full" @click="login" :disabled="loading">
          {{ loading ? '登录中...' : '登录' }}
        </button>
      </template>
      <div class="auth-toggle">
        {{ showAuth === 'register' ? '已有账号？' : '没有账号？' }}
        <a @click="showAuth = showAuth === 'register' ? 'login' : 'register'">
          {{ showAuth === 'register' ? '去登录' : '去注册' }}
        </a>
      </div>
    </div>

    <!-- FAQ -->
    <div style="margin-top:28px">
      <div class="faq-item" v-for="(f,i) in faqs" :key="i">
        <div class="q" @click="faqOpen = faqOpen === i ? -1 : i">
          <span>{{ f.q }}</span>
          <span class="arrow" :class="{open: faqOpen === i}">&#9660;</span>
        </div>
        <div class="a" :class="{open: faqOpen === i}">{{ f.a }}</div>
      </div>
    </div>
  </div>
</template>

<!-- Logged in -->
<template v-else>
  <div class="container">
    <!-- Setup onboarding -->
    <div v-if="showSetup" class="setup-box">
      <h2>完善账号信息</h2>
      <p class="setup-sub">填写你的 LOFTER 账号，开始互助点赞</p>
      <div class="form-group">
        <label>点赞号（马甲号）</label>
        <input v-model="setupForm.username" type="text" placeholder="你的 LOFTER 马甲号链接，如 https://xxx.lofter.com/">
        <div class="hint">用这个号去给别人点赞</div>
      </div>
      <div class="form-group">
        <label>收赞号文章地址</label>
        <input v-model="setupForm.main_account" type="text" placeholder="你的 LOFTER 文章链接，如 https://yyy.lofter.com/post/xxxxx_xxxxx">
        <div class="hint">别人会直接去这个文章页给你点赞</div>
      </div>
      <button class="btn-full" @click="saveSetup" :disabled="loading">
        {{ loading ? '保存中...' : '保存并开始' }}
      </button>
      <button class="btn-skip" @click="skipSetup">稍后再填，先逛逛</button>
    </div>

    <!-- Main dashboard (only show after setup) -->
    <template v-else>
    <!-- Welcome -->
    <div class="welcome-bar">
      <div class="left">
        <div class="avatar">{{ profile.username ? profile.username[0].toUpperCase() : '?' }}</div>
        <div class="info">
          <h3>{{ profile.username }}</h3>
          <p>收赞文章：{{ profile.main_account }}</p>
        </div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="num given">{{ profile.given_count }}</div>
          <div class="label">已点赞</div>
        </div>
        <div class="stat">
          <div class="num received">{{ profile.received_count }}</div>
          <div class="label">已收赞</div>
        </div>
        <button class="btn-settings" @click="openSettings">&#9881; 设置</button>
        <button class="btn-logout" @click="logout">退出</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab" :class="{active: tab==='task'}" @click="tab='task'">点赞任务</button>
      <button class="tab" :class="{active: tab==='queue'}" @click="tab='queue'">排队队列</button>
      <button class="tab" :class="{active: tab==='log'}" @click="tab='log'">溯源日志</button>
    </div>

    <!-- Task tab -->
    <div v-if="tab==='task'">
      <div v-if="loadingTask" class="loading">
        <div class="spinner"></div>
        <p>加载任务中...</p>
      </div>
      <template v-else>
        <div class="task-card" v-if="currentTask">
          <div class="task-header">
            <span class="task-badge">待点赞</span>
            <span class="task-status">任务 #{{ currentTask.id }}</span>
            <span v-if="currentTask.is_test" class="test-badge">测试</span>
          </div>
          <div class="task-info">
            为 <span>{{ currentTask.target_user }}</span> 的文章点赞<br>
            完成后你的收赞号将排入队列
          </div>
          <div class="task-url-box">
            <div class="label">文章地址</div>
            <div class="url">{{ currentTask.article_url }}</div>
          </div>
          <div class="task-actions">
            <a :href="currentTask.article_url" target="_blank" class="btn-go">去点赞</a>
            <button class="btn-confirm" @click="confirmTask" :disabled="verifying">
              {{ verifying ? '验证中...' : '确认完成' }}
            </button>
          </div>
        </div>
        <div class="empty-state" v-else>
          <div class="icon">&#127881;</div>
          <h3>暂无可用任务</h3>
          <p v-if="profile.today_given >= 20">今日点赞已达上限（20/20），明天再来吧</p>
          <p v-else>当前没有待点赞的文章，请稍后再来</p>
        </div>
      </template>
    </div>

    <!-- Queue tab -->
    <div v-if="tab==='queue'">
      <div v-if="queueLoading" class="loading">
        <div class="spinner"></div>
        <p>加载队列中...</p>
      </div>
      <template v-else>
        <div class="queue-list" v-if="queue.length > 0">
          <div class="queue-item" v-for="(item, i) in queue" :key="i">
            <div class="pos" :class="item.status">{{ item.position }}</div>
            <div class="info">
              <div class="name">{{ item.users ? item.users.username : item.username }}</div>
              <div class="status" :class="item.status">{{ item.status === 'done' ? '已完成' : item.status === 'active' ? '正在收赞' : '排队中' }}</div>
            </div>
          </div>
        </div>
        <div class="empty-state" v-else>
          <div class="icon">&#128202;</div>
          <h3>队列为空</h3>
          <p>完成点赞任务后，你的创作号将排入队列</p>
        </div>
      </template>
    </div>

    <!-- Log tab -->
    <div v-if="tab==='log'">
      <div v-if="logLoading" class="loading">
        <div class="spinner"></div>
        <p>加载日志中...</p>
      </div>
      <template v-else>
        <div class="log-list" v-if="logs.length > 0">
          <div class="log-item" v-for="log in logs" :key="log.id">
            <span class="from">{{ log.giver }}</span>
            <span class="arrow">为</span>
            <span class="to">{{ log.receiver || '未知' }}</span>
            <span class="arrow">点赞</span>
            <span class="time">{{ formatTime(log.created_at) }}</span>
          </div>
        </div>
        <div class="empty-state" v-else>
          <div class="icon">&#128221;</div>
          <h3>暂无日志</h3>
          <p>点赞记录将显示在这里</p>
        </div>
      </template>
    </div>
    </template>
  </div>
</template>

<!-- Settings Modal -->
<div class="modal-overlay" v-if="showSettingsModal" @click.self="showSettingsModal = false">
  <div class="modal-box">
    <h2>账号设置</h2>
    <div class="form-group">
      <label>点赞号（马甲号）</label>
      <input v-model="settingsForm.username" type="text" placeholder="你的 LOFTER 马甲号链接">
      <div class="hint">用这个号去给别人点赞</div>
    </div>
    <div class="form-group">
      <label>收赞号文章地址</label>
      <input v-model="settingsForm.main_account" type="text" placeholder="你的 LOFTER 文章链接">
      <div class="hint">别人会直接去这个文章页给你点赞</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" @click="showSettingsModal = false">取消</button>
      <button class="btn-save" @click="saveSettings" :disabled="loading">{{ loading ? '保存中...' : '保存' }}</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" :class="toast.type" v-if="toast.show">{{ toast.msg }}</div>

<!-- Footer -->
<div class="footer">
  赞链 v0.3.0
  <span class="divider">|</span>
  <a href="https://github.com/makeloftergreat/zanlian" target="_blank">GitHub</a>
  <span class="divider">|</span>
  LOFTER 点赞互助平台
</div>

</div>

<script>
const { createApp, ref, reactive, computed, onMounted, watch } = Vue;
const sb = window.supabase.createClient('https://zrxvibalglblsjbzlzut.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpyeHZpYmFsZ2xibHNqYnpsenV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NjkxNTYsImV4cCI6MjA5ODU0NTE1Nn0.kZvWuvNgWo6LaLV19HIadbo3kSDP9mYys4gUUsmewzY');

createApp({
  setup() {
    const user = ref(null);
    const loading = ref(false);
    const loadingTask = ref(false);
    const verifying = ref(false);
    const queueLoading = ref(false);
    const logLoading = ref(false);
    const showAuth = ref(null);
    const authError = ref('');
    const tab = ref('task');
    const faqOpen = ref(-1);
    const currentTask = ref(null);
    const queue = ref([]);
    const logs = ref([]);
    const toast = reactive({ show: false, msg: '', type: 'info' });

    const regForm = reactive({ email: '', password: '' });
    const setupForm = reactive({ username: '', main_account: '' });
    const showSetup = ref(false);
    const loginForm = reactive({ email: '', password: '' });
    const profile = reactive({ username: '', main_account: '', given_count: 0, received_count: 0, today_given: 0, last_given_date: '' });
    const showSettingsModal = ref(false);
    const settingsForm = reactive({ username: '', main_account: '' });

    const faqs = [
      { q: '马甲号和创作号有什么区别？', a: '马甲号是你用来给别人点赞的账号，创作号是你发布原创内容、需要获得点赞的账号。两者完全隔离，互不暴露。' },
      { q: '每天最多能点赞多少次？', a: '每天最多 20 次，防止滥用。每天 0 点重置计数。' },
      { q: '多久能收到回赞？', a: '取决于队列长度和你前面有多少人。排队按先来后到，位置透明可查。' },
      { q: '会泄露我的创作号吗？', a: '不会。溯源日志中只显示马甲号，创作号信息仅你自己可见。' },
      { q: '点赞后对方怎么知道是我点的？', a: '系统会记录"马甲A -> 创作B"的溯源关系，你帮别人点赞后，对方会在溯源日志中看到你的马甲号。' }
    ];

    function showToast(msg, type = 'info') {
      toast.msg = msg; toast.type = type; toast.show = true;
      setTimeout(() => { toast.show = false; }, 3000);
    }

    async function loadProfile() {
      if (!user.value) return;
      const { data, error } = await sb.from('users').select('*').eq('id', user.value.id).maybeSingle();
      if (data) {
        profile.username = data.username || '';
        profile.main_account = data.main_account || '';
        profile.given_count = data.given_count || 0;
        profile.received_count = data.received_count || 0;
        const today = new Date().toISOString().slice(0, 10);
        profile.today_given = data.last_given_date === today ? data.today_given : 0;
      } else {
        // users 表里没有这行（旧用户），自动创建
        await sb.from('users').upsert({ id: user.value.id, username: '', main_account: '' });
        profile.username = '';
        profile.main_account = '';
      }
    }

    const testArticle = {
      url: 'https://pingpangdaguoshou.lofter.com/post/ade72416_34df7d930',
      title: '乒乓大国手的文章',
      author: '乒乓大国手'
    };

    async function loadTask() {
      loadingTask.value = true;
      const { data, error } = await sb.from('tasks').select('*').eq('giver_id', user.value.id).eq('status', 'pending').order('created_at', { ascending: false }).limit(1);
      if (data && data.length > 0) {
        currentTask.value = data[0];
      } else {
        const { data: q } = await sb.from('queue').select('*').eq('status', 'waiting').order('position', { ascending: true }).limit(1);
        if (q && q.length > 0) {
          const target = q[0];
          const { data: targetUser } = await sb.from('users').select('main_account').eq('id', target.user_id).single();
          if (targetUser && targetUser.main_account) {
            const { data: task } = await sb.from('tasks').insert({
              giver_id: user.value.id, receiver_id: target.user_id, article_url: targetUser.main_account, status: 'pending'
            }).select().single();
            currentTask.value = task;
          } else {
            currentTask.value = null;
          }
        } else {
          // 测试模式：队列为空时，展示测试文章供点赞
          currentTask.value = { id: 'test', article_url: testArticle.url, target_user: testArticle.author, is_test: true };
        }
      }
      loadingTask.value = false;
    }

    async function confirmTask() {
      if (!currentTask.value) return;
      const today = new Date().toISOString().slice(0, 10);
      if (profile.last_given_date === today && profile.today_given >= 20) {
        showToast('今日点赞已达上限（20/20）', 'error'); return;
      }

      // 验证点赞：调用服务端验证接口
      verifying.value = true;
      try {
        const verifyResp = await fetch('/api/verify-like', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            article_url: currentTask.value.article_url,
            liker_name: profile.username,
          }),
        });
        const verifyData = await verifyResp.json();

        if (!verifyResp.ok || verifyData.error) {
          showToast('验证失败：' + (verifyData.error || '服务异常'), 'error');
          verifying.value = false;
          return;
        }

        if (!verifyData.verified) {
          showToast('未检测到你的点赞，请先去文章页点红心后再确认', 'error');
          verifying.value = false;
          return;
        }
      } catch (err) {
        showToast('验证服务异常：' + err.message, 'error');
        verifying.value = false;
        return;
      }
      verifying.value = false;

      // 更新点赞者统计
      profile.given_count += 1;
      profile.today_given = (profile.last_given_date === today ? profile.today_given : 0) + 1;
      profile.last_given_date = today;
      await sb.from('users').update({ given_count: profile.given_count, today_given: profile.today_given, last_given_date: today }).eq('id', user.value.id);

      // 写溯源日志
      let receiverName = '测试文章';
      if (currentTask.value.receiver_id) {
        const { data: recvUser } = await sb.from('users').select('username').eq('id', currentTask.value.receiver_id).single();
        if (recvUser && recvUser.username) receiverName = recvUser.username;
      } else if (currentTask.value.target_user) {
        receiverName = currentTask.value.target_user;
      }
      await sb.from('logs').insert({ giver: profile.username, receiver: receiverName, giver_id: user.value.id, receiver_id: currentTask.value.receiver_id || null });

      // 入队列排队
      await sb.from('queue').insert({ user_id: user.value.id, position: 0, status: 'waiting' });

      // 测试模式：不更新 tasks 表
      if (!currentTask.value.is_test) {
        const taskId = currentTask.value.id;
        const receiverId = currentTask.value.receiver_id;
        await sb.from('tasks').update({ status: 'done', done_at: new Date().toISOString() }).eq('id', taskId);
        await sb.from('users').update({ received_count: (profile.received_count || 0) + 1 }).eq('id', receiverId);
      }

      showToast('验证通过！点赞完成，你的收赞号已排入队列', 'success');
      currentTask.value = null;
      await loadProfile();
      await loadTask();
      await loadQueue();
      await loadLogs();
    }

    async function loadQueue() {
      queueLoading.value = true;
      const { data, error } = await sb.from('queue').select('*, users(username)').order('position', { ascending: true }).limit(50);
      if (data && data.length > 0) {
        queue.value = data.map((item, i) => ({ ...item, position: i + 1 }));
      } else {
        // 测试模式：显示测试队列
        queue.value = [{ position: 1, status: 'waiting', users: { username: testArticle.author }, is_test: true }];
      }
      queueLoading.value = false;
    }

    async function loadLogs() {
      logLoading.value = true;
      const { data, error } = await sb.from('logs').select('*').order('created_at', { ascending: false }).limit(50);
      if (data) {
        logs.value = data;
      }
      logLoading.value = false;
    }

    async function register() {
      authError.value = '';
      if (!regForm.email || !regForm.password) {
        authError.value = '请填写邮箱和密码'; return;
      }
      if (regForm.password.length < 6) { authError.value = '密码至少 6 位'; return; }
      loading.value = true;
      const { data, error } = await sb.auth.signUp({ email: regForm.email, password: regForm.password });
      if (error) { authError.value = error.message; loading.value = false; return; }
      if (data.user) {
        await sb.from('users').insert({ id: data.user.id, username: '', main_account: '' });
        user.value = data.user;
        await loadProfile();
        showAuth.value = null;
        showSetup.value = true;
        showToast('注册成功！请完善你的账号信息', 'success');
      }
      loading.value = false;
    }

    async function saveSetup() {
      if (!setupForm.username || !setupForm.main_account) {
        showToast('请填写点赞号和收赞号', 'error'); return;
      }
      loading.value = true;
      const { error } = await sb.from('users').upsert({ id: user.value.id, username: setupForm.username, main_account: setupForm.main_account }).eq('id', user.value.id);
      if (error) { showToast('保存失败：' + error.message, 'error'); loading.value = false; return; }
      profile.username = setupForm.username;
      profile.main_account = setupForm.main_account;
      showSetup.value = false;
      showToast('账号信息已保存！', 'success');
      await loadTask();
      await loadQueue();
      await loadLogs();
      loading.value = false;
    }

    async function login() {
      authError.value = '';
      if (!loginForm.email || !loginForm.password) { authError.value = '请填写邮箱和密码'; return; }
      loading.value = true;
      const { data, error } = await sb.auth.signInWithPassword({ email: loginForm.email, password: loginForm.password });
      if (error) { authError.value = error.message; loading.value = false; return; }
      user.value = data.user;
      await loadProfile();
      showAuth.value = null;
      if (!profile.username) {
        showSetup.value = true;
        showToast('请先完善账号信息', 'info');
      } else {
        await loadTask();
        await loadQueue();
        await loadLogs();
        showToast('登录成功', 'success');
      }
      loading.value = false;
    }

    function skipSetup() {
      showSetup.value = false;
      showToast('稍后可在设置中填写', 'info');
    }

    function openSettings() {
      settingsForm.username = profile.username;
      settingsForm.main_account = profile.main_account;
      showSettingsModal.value = true;
    }

    async function saveSettings() {
      if (!settingsForm.username || !settingsForm.main_account) {
        showToast('请填写点赞号和收赞号', 'error'); return;
      }
      loading.value = true;
      const { error } = await sb.from('users').upsert({ id: user.value.id, username: settingsForm.username, main_account: settingsForm.main_account }).eq('id', user.value.id);
      if (error) { showToast('保存失败：' + error.message, 'error'); loading.value = false; return; }
      profile.username = settingsForm.username;
      profile.main_account = settingsForm.main_account;
      showSettingsModal.value = false;
      showToast('设置已保存', 'success');
      loading.value = false;
    }

    async function logout() {
      await sb.auth.signOut();
      user.value = null;
      showAuth.value = null;
      showSetup.value = false;
      showSettingsModal.value = false;
      setupForm.username = '';
      setupForm.main_account = '';
      showToast('已退出登录', 'info');
    }

    function formatTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, '0');
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    watch(tab, (val) => {
      if (val === 'queue' && queue.value.length === 0) loadQueue();
      if (val === 'log' && logs.value.length === 0) loadLogs();
    });

    onMounted(async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        user.value = session.user;
        await loadProfile();
        if (profile.username) {
          await loadTask();
          await loadQueue();
          await loadLogs();
        } else {
          showSetup.value = true;
        }
      }
    });

    return {
      user, loading, loadingTask, verifying, queueLoading, logLoading, showAuth, authError, tab, faqOpen,
      currentTask, queue, logs, toast, regForm, loginForm, profile, faqs,
      setupForm, showSetup, saveSetup, skipSetup,
      showSettingsModal, settingsForm, openSettings, saveSettings,
      register, login, logout, confirmTask, loadTask, loadQueue, loadLogs, formatTime
    };
  }
}).mount('#app');
</script>
</body>
</html>
